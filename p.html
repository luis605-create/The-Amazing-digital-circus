<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Platformer Game</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Scene setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Player setup
        const playerGeometry = new THREE.BoxGeometry(1, 1, 1);
        const playerMaterial = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
        const player = new THREE.Mesh(playerGeometry, playerMaterial);
        scene.add(player);

        // Platform setup
        const platformGeometry = new THREE.BoxGeometry(5, 0.1, 5);
        const platformMaterial = new THREE.MeshBasicMaterial({ color: 0x0000ff });
        const platform = new THREE.Mesh(platformGeometry, platformMaterial);
        platform.position.y = -1;
        scene.add(platform);

        // Controls
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let canJump = false;
        const playerVelocity = new THREE.Vector3();
        const velocity = new THREE.Vector3();
        const gravity = -9.8;

        document.addEventListener('keydown', (event) => {
            switch (event.key) {
                case 'ArrowUp':
                case 'w': moveForward = true; break;
                case 'ArrowDown':
                case 's': moveBackward = true; break;
                case 'ArrowLeft':
                case 'a': moveLeft = true; break;
                case 'ArrowRight':
                case 'd': moveRight = true; break;
                case ' ': if (canJump) playerVelocity.y = 5; canJump = false; break;
            }
        });

        document.addEventListener('keyup', (event) => {
            switch (event.key) {
                case 'ArrowUp':
                case 'w': moveForward = false; break;
                case 'ArrowDown':
                case 's': moveBackward = false; break;
                case 'ArrowLeft':
                case 'a': moveLeft = false; break;
                case 'ArrowRight':
                case 'd': moveRight = false; break;
            }
        });

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            const delta = 0.1; // Assume fixed time step
            playerVelocity.y += gravity * delta;
            if (moveForward) player.position.z -= 0.1;
            if (moveBackward) player.position.z += 0.1;
            if (moveLeft) player.position.x -= 0.1;
            if (moveRight) player.position.x += 0.1;
            player.position.y += playerVelocity.y * delta;
            if (player.position.y < -1) {
                player.position.y = -1;
                playerVelocity.y = 0;
                canJump = true;
            }
            renderer.render(scene, camera);
        }

        // Camera movement
        document.addEventListener('mousemove', (event) => {
            const movementX = event.movementX || event.mozMovementX || event.webkitMovementX || 0;
            camera.rotation.y -= movementX * 0.002;
            camera.rotation.x -= event.movementY * 0.002;
            camera.position.x = player.position.x;
            camera.position.z = player.position.z + 5;
            camera.position.y = player.position.y + 2;
            camera.lookAt(player.position);
        });

        animate();
    </script>
</body>
</html>
